<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">GS &amp; Co Premium Logo</title>
  <desc id="desc">Circular premium monogram logo for Govindasamy and Co</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2432"/>
      <stop offset="55%" stop-color="#1f5a7a"/>
      <stop offset="100%" stop-color="#2f7395"/>
    </linearGradient>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7d39e"/>
      <stop offset="50%" stop-color="#e8b46b"/>
      <stop offset="100%" stop-color="#c8873a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b1b25" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="120" cy="120" r="102" fill="url(#bgGradient)"/>
    <circle cx="120" cy="120" r="92" fill="none" stroke="url(#ringGradient)" stroke-width="4"/>
    <circle cx="120" cy="120" r="78" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  </g>

  <text x="120" y="117" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" letter-spacing="1" fill="#fdf6ec">GS</text>
  <line x1="84" y1="132" x2="156" y2="132" stroke="url(#ringGradient)" stroke-width="2" stroke-linecap="round"/>
  <text x="120" y="154" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="2.6" fill="#f3dcb3">GOVINDASAMY &amp; CO</text>
</svg>
